name: NusaCyber CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_dashboard:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        cd dashboard
        npm install

    - name: Ensure Successful Build
      run: |
        cd dashboard
        npm run build
